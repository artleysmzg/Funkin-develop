name: Build Windows Debug

on:
  push:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Haxe
        uses: ./.github/actions/setup-haxe

      - name: Fix HXCPP
        run: |
          cd .haxelib/hxcpp/git/tools/hxcpp
          haxe compile.hxml
          cd ../../project
          neko build.n

      - name: Setup HXCPP
        run: |
          cd .haxelib/hxcpp/git/tools/hxcpp
          haxe compile.hxml
          cd ../../../../..
          
      - name: Rebuild Lime
        run: |
          haxelib run lime rebuild windows

      - name: Build Windows
        run: |
          haxelib run lime build windows -release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-debug-build
          path: export/debug/windows/bin/
