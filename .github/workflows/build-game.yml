name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  buildWindows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Haxe + Haxelib
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Cache Haxelib
        uses: actions/cache@v4
        with:
          path: |
            export
            C:\haxelib
            C:\Users\runneradmin\.haxelib
          key: ${{ runner.os }}-haxelib-${{ hashFiles('**/.github/workflows/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-haxelib-

      - name: Install libs
        shell: cmd
        run: |
          haxelib setup C:\haxelib
          
          git submodule update --init --recursive

          haxelib install hmm
          haxelib run hmm setup
          haxelib hmm install
          
          haxelib install lime
          
          haxelib install flixel
          haxelib install flixel-addons
          haxelib install flixel-animate
          
          haxelib install json2object
          haxelib install jsonpath
          haxelib install jsonpatch
          
          haxelib install thx.core
          haxelib install thx.semver
          
          haxelib install hxp
          haxelib install hxcpp
          haxelib install hxvlc
          haxelib install hxdiscord_rpc
          
          haxelib install grig.audio
          haxelib install newgrounds
          haxelib install polymod
          
          haxelib git funkin.vis https://github.com/FunkinCrew/funkVis
          
          haxelib run lime setup

      - name: Build 
        shell: cmd
        run: |
          haxelib run lime build windows

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Build
          path: export/release/windows/bin
