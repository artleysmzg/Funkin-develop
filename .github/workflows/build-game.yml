name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  buildWindows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Haxe + Haxelib
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.2

      - name: Cache Haxelib
        uses: actions/cache@v4
        with:
          path: |
            export
            C:\haxelib
            C:\Users\runneradmin\.haxelib
          key: ${{ runner.os }}-haxelib-${{ hashFiles('**/.github/workflows/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-haxelib-

      - name: Install libs
        shell: cmd
        run: |
          haxelib setup C:\haxelib
          build/windows.bat
          haxelib install hxp

      - name: Build 
        shell: cmd
        run: |
          haxelib run lime build windows

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Build
          path: export/release/windows/bin
